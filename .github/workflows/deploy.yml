name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Grant write permissions so github-actions[bot] can push to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate config.js from secrets
        run: |
          cat << 'EOF' > config.js
          const CONFIG = {
            csvUrl: '${{ secrets.CSV_URL }}',
            geocoding: {
              primary: {
                endpoint: 'https://nominatim.openstreetmap.org/search',
                apiKey: '',
                delayBetweenRequests: 200
              },
              fallback: {
                endpoint: 'https://api.openrouteservice.org/geocode/search',
                apiKey: '${{ secrets.ORS_API_KEY }}',
                proxy: 'https://corsproxy.io/?',
                delayBetweenRequests: 200
              },
              directParse: { enabled: true }
            },
            map: {
              initialView: [40.7128, -74.0060],
              initialZoom: 11,
              maxZoom: 19,
              tileLayer: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
              tileAttribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            },
            columns: {
              name: 'mural_title',
              artist: 'artist_names',
              description: 'tour_description',
              year: 'year',
              borough: 'borough',
              neighborhood: 'neighborhood',
              imageUrl: 'image_url',
              detailUrl: 'detail_url',
              streetAddress: 'street_address',
              status: 'status'
            },
            skipRows: {
              keywords: ['digital download', 'not murals', 'online stuff'],
              emptyTitle: true
            },
            popup: {
              maxWidth: 320,
              maxHeight: 500,
              descriptionTruncate: 0
            },
            marker: {
              color: '#4CAF50',
              borderColor: '#2E7D32',
              highlightColor: '#81C784',
              size: 32,
              anchor: [16, 42],
              popupAnchor: [0, -38]
            },
            legend: {
              position: 'bottomright',
              title: 'Thrive Murals'
            }
          };

          if (typeof module !== 'undefined' && module.exports) {
            module.exports = CONFIG;
          }
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
