<!--
  ============================================================
  THRIVE COLLECTIVE – MURAL MAP
  ============================================================
  Self-contained static site. Works on GitHub Pages, Netlify,
  Vercel static, or opened directly from the file system.
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Interactive map of Thrive Collective murals across New York City." />
  <meta name="theme-color" content="#0f172a" />
  <title>Thrive Collective – Mural Map</title>

  <link rel="icon" href="ThriveCollective_BlackLogoHorizontal.png" type="image/png" sizes="any" />

  <!-- Leaflet & plugins CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Inline styles for search dropdown & buttons -->
  <style>
    .search-results-dropdown {
      position: relative;
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      box-shadow: var(--panel-shadow);
      display: none;
      z-index: 20;
      backdrop-filter: blur(12px);
    }
    .search-results-dropdown.visible { display: block; }
    .search-result-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-main);
      border-bottom: 1px solid var(--panel-border);
      transition: background 0.15s;
    }
    .search-result-item:hover { background: rgba(59,130,246,0.15); }
    .search-result-item .result-sub {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
    }
    .search-wrapper {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .search-wrapper input { flex: 1; }
    .clear-search-btn {
      background: var(--card-bg);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .clear-search-btn:hover {
      background: var(--input-focus-bg);
      color: var(--text-main);
      border-color: var(--brand-blue);
    }
    .surprise-btn {
      background: var(--brand-pink);
      color: #0f172a;
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 2px 8px rgba(244,114,182,0.3);
    }
    .surprise-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar" role="complementary" aria-label="Controls and filters">

    <div class="mobile-sheet-handle" id="mobileSheetHandle" role="button" aria-label="Toggle panel" tabindex="0"></div>

    <button id="sidebarHideBtn" class="sidebar-hide-btn" aria-label="Hide sidebar" title="Hide sidebar">
      <span aria-hidden="true">&#8249;</span>
    </button>

    <header class="sidebar-header">
      <img src="ThriveCollective_BlackLogoHorizontal.png" alt="Thrive Collective logo" class="logo" />
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle light/dark mode" title="Switch theme">
        <span id="themeToggleText">Light Mode</span>
      </button>
    </header>

    <!-- LOCATION SEARCH -->
    <section class="utility-panel" aria-label="Location search">
      <div class="utility-headline"><p>Find a mural near you.</p></div>
      <input id="manual-address-input" type="text" placeholder="Enter your address or zip code..." class="address-input" autocomplete="off" aria-label="Enter address" />
      <div class="location-actions">
        <button id="start-search-btn" class="primary-btn">Start</button>
        <button id="use-device-gps-btn" class="ghost-btn">Use Device GPS</button>
        <button id="clearLocationBtn" class="ghost-btn">Clear</button>
      </div>
      <div id="nearestResults" class="nearest-results empty" aria-live="polite"></div>
    </section>

    <!-- CUSTOM TOUR BUILDER -->
    <section class="custom-tour-trigger-panel" aria-label="Custom tour builder">
      <div style="margin-bottom:10px;">
        <label for="customTourSetting" style="font-size:11px; text-transform:uppercase; color:var(--text-muted); display:block; font-weight:600; letter-spacing:0.5px;">
          Tour Setting
          <span class="info-tip" data-tip="Exterior: Public murals. Interior: Inside buildings. Any: Mixed tour." aria-label="Help">(?)</span>
        </label>
        <select id="customTourSetting" class="filter-select">
          <option value="exterior" selected>Exterior Only</option>
          <option value="any">Both Exterior + Interior</option>
          <option value="interior">Interior Only</option>
        </select>
      </div>
      <div style="margin-bottom:10px;">
        <label for="customTourRadius" style="font-size:11px; text-transform:uppercase; color:var(--text-muted); display:block; font-weight:600; letter-spacing:0.5px;">
          Tour Radius
          <span id="customTourRadiusLabel" style="font-weight:700; color:var(--text-main);">1 mile</span>
        </label>
        <input id="customTourRadius" type="range" min="0.5" max="5" step="0.5" value="1" aria-label="Tour radius in miles" />
      </div>
      <div style="margin-bottom:10px;">
        <label for="customTourLimit" style="font-size:11px; text-transform:uppercase; color:var(--text-muted); display:block; font-weight:600; letter-spacing:0.5px;">
          Mural Count
          <span id="customTourLimitLabel" style="font-weight:700; color:var(--text-main);">6 stops</span>
        </label>
        <input id="customTourLimit" type="range" min="2" max="20" step="1" value="6" aria-label="Number of tour stops" />
      </div>
      <div id="customTourSummary" style="font-size:12px; color:var(--text-muted); margin-bottom:12px; min-height:18px;">
        Set your location first to preview local tour stops.
      </div>
      <button id="createCustomTourBtn" class="custom-tour-header-btn"><span>Create Local Tour</span></button>
    </section>

    <!-- FILTERS & SEARCH -->
    <section class="filters" aria-label="Filters and search">
      <div class="filter-group">
        <label>Mural View <span class="info-tip" data-tip="Reduces map clutter by displaying a random sampling of murals." aria-label="Help">(?)</span> &#8212; <span id="muralViewLabel">100%</span></label>
        <input type="range" id="muralViewSlider" min="10" max="100" step="5" value="100" class="mural-view-slider" aria-label="Percentage of murals to display" />
      </div>
      <div class="filter-group">
        <button id="clearAllFiltersBtn" class="ghost-btn" style="width:100%; margin-top:5px;">Clear All Filters</button>
      </div>

      <!-- Narrator toggle -->
      <div class="filter-group" style="margin-top:10px;">
        <label style="display:flex; align-items:center; cursor:pointer; color:var(--text-main); text-transform:uppercase; letter-spacing:0.02em;">
          <input type="checkbox" id="enableNarrator" style="margin-right:10px; width:18px; height:18px;" />
          Enable Narrator
        </label>
      </div>

      <!-- Search with dropdown & Surprise Me -->
      <div class="filter-group" style="margin-top:20px;">
        <label for="searchInput">Search Murals</label>
        <div class="search-wrapper">
          <input type="text" id="searchInput" placeholder="Type mural title, artist, or description..." aria-label="Search murals" />
          <button id="clearSearchBtn" class="clear-search-btn" title="Clear search">✕</button>
          <button id="surpriseMeBtn" class="surprise-btn" title="Go to a random mural">🎲 Surprise Me</button>
        </div>
        <div id="searchResults" class="search-results-dropdown"></div>
      </div>

      <!-- Advanced Search Filters Toggle -->
      <div style="border-top:1px solid var(--panel-border); margin-top:10px; padding-top:5px;">
        <button id="toggleSearchFiltersBtn" class="view-all-btn" style="width:100%; text-align:left; padding:10px 0; display:flex; justify-content:space-between; align-items:center; font-weight:600; color:var(--heading-color); text-transform:uppercase; font-size:13px; letter-spacing:0.5px;">
          <span>Advanced Search Filters</span>
          <span id="toggleSearchFiltersIcon">+</span>
        </button>
        <div id="searchFiltersContainer" style="display:none; flex-direction:column; gap:20px;">
          <div class="filter-group">
            <label for="yearFilter">Year</label>
            <select id="yearFilter" class="filter-select"><option value="">All Years</option></select>
          </div>
          <div class="filter-group">
            <label for="schoolsFilter">Schools / Sites</label>
            <select id="schoolsFilter" class="filter-select"><option value="">All Schools / Sites</option></select>
          </div>
          <div class="filter-group">
            <label for="boroughFilter">Locations</label>
            <select id="boroughFilter" class="filter-select"><option value="">All Boroughs</option></select>
          </div>
        </div>
      </div>
    </section>

    <!-- RECENTLY VIEWED -->
    <section class="recents-panel" aria-label="Recently viewed murals">
      <div class="filter-header"><label>Recently Viewed</label></div>
      <div id="recentMuralsList" class="recent-list" role="list"></div>
    </section>

    <!-- SAVED MURALS -->
    <section class="saved-panel" aria-label="Saved murals">
      <div class="filter-header"><label>Saved Murals</label></div>
      <div id="savedMuralsList" class="recent-list" role="list"></div>
    </section>

    <!-- FEATURED MURALS -->
    <section class="featured-panel" aria-label="Featured murals">
      <div class="filter-header">
        <label>Featured Murals</label>
        <button id="refreshFeaturedMuralsBtn" class="view-all-btn" style="text-decoration:none; font-weight:600;">Refresh</button>
      </div>
      <div id="featuredMuralsList" role="list"></div>
    </section>

    <!-- Footer -->
    <footer style="border-top:1px solid var(--panel-border); padding-top:12px; margin-top:8px; font-size:10px; color:var(--text-muted); text-align:center;">
      Data &copy; Thrive Collective &bull; Map &copy; OpenStreetMap contributors
      <br /><span style="font-size:9px; opacity:0.6;">Built with Leaflet &amp; ❤️</span>
    </footer>
  </aside>

  <!-- VIEW ALL MODAL -->
  <div id="viewAllModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">View All</h2>
        <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- MAP CONTAINER -->
  <main id="map-container" role="main" aria-label="Interactive map">
    <div id="map">
      <div id="map-loading" aria-live="polite">Loading murals...</div>
      <div id="map-error" class="hidden" role="alert"></div>
    </div>
  </main>

  <!-- TOUR ITINERARY -->
  <div id="tourItinerary" role="dialog" aria-label="Tour itinerary" aria-modal="true">
    <div class="tour-header">
      <h3 id="tourTitle">Mural Tour</h3>
      <button id="endTourBtn" aria-label="End tour">End Tour</button>
    </div>
    <div class="tour-stops" id="tourStopsList" role="list"></div>
    <div class="tour-nav">
      <button id="tourPrevBtn" class="secondary" aria-label="Previous stop">Previous</button>
      <button id="tourNextBtn" aria-label="Next stop">Next</button>
      <button id="tourRouteBtn" class="secondary" aria-label="Show route on map">Show Route</button>
    </div>
  </div>

  <!-- SIDEBAR SHOW TAB -->
  <button id="sidebarShowTab" class="sidebar-show-tab hidden" aria-label="Show sidebar" aria-expanded="false" title="Show sidebar">
    <span aria-hidden="true">&#8250;</span>
  </button>

  <!-- TOAST -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

</div><!-- end #app -->

<script>
  const CONFIG = {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGG7nJALaHS51jJ7BEcfeu-MqPPoTXUo5hkJd1NE-tTn9W76gduRp5dPDoOEsQMFbd8LYm4Oq8-R9_/pub?output=csv',

    geocoding: {
      // No backend available in standalone mode — uses ORS + Nominatim directly from browser.
      backendEndpoint: null,
      primary: {
        endpoint: 'https://api.openrouteservice.org/geocode/search',
        apiKey: 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjMzMTkzMjU2M2NiYjRkOTc4ODE5ZmU2Y2IzNTg0OTBkIiwiaCI6Im11cm11cjY4In0=',
        proxy: 'https://corsproxy.io/?',
        delayBetweenRequests: 200
      },
      fallback: {
        endpoint: 'https://nominatim.openstreetmap.org/search',
        delayBetweenRequests: 1000
      },
      directParse: { enabled: true }
    },

    map: {
      initialView: [40.7128, -74.0060],
      initialZoom: 11,
      maxZoom: 19,
      tileLayer: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      tileAttribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    },

    columns: {
      name: 'mural_title',
      artist: 'artist_names',
      description: 'tour_description',
      year: 'year',
      borough: 'borough',
      neighborhood: 'neighborhood',
      imageUrl: 'image_url',
      detailUrl: 'detail_url',
      streetAddress: 'street_address',
      status: 'status'
    },

    skipRows: {
      keywords: ['digital download', 'not murals', 'online stuff'],
      emptyTitle: true
    },

    popup: {
      maxWidth: 320,
      maxHeight: 500,
      descriptionTruncate: 0
    },

    marker: {
      color: '#4CAF50',
      borderColor: '#2E7D32',
      highlightColor: '#81C784',
      size: 32,
      anchor: [16, 42],
      popupAnchor: [0, -38]
    },

    legend: {
      position: 'bottomright',
      title: 'Thrive Murals'
    }
  };
</script>

<!-- JS Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<!-- Main app logic -->
<script src="map.js"></script>

</body>
</html>
